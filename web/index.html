<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kantin Digital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-4">

    <div class="card shadow-lg">

        <div class="card-header bg-warning text-center">

            <h2>🍽️ Kantin Digital</h2>

            <p class="mb-0">
                Sistem Pemesanan Berbasis Blockchain Ethereum
            </p>

        </div>

        <div class="card-body">


                Sistem Pemesanan Kebutuhan Mahasiswa Berbasis Blockchain
            <!-- Nama Pembeli -->

            <div class="mb-4">

                <label class="form-label">

                    Nama Pembeli

                </label>

                <input
                    type="text"
                    id="customer"
                    class="form-control"
                    placeholder="Masukkan Nama Pembeli">

            </div>

            <hr>

            <!-- MAKANAN -->

            <h4 class="mb-3">

                🍛 Daftar Makanan

            </h4>

            <div id="foodList" class="row g-3">

            </div>

            <hr>

            <!-- MINUMAN -->

            <h4 class="mb-3">

                🥤 Daftar Minuman

            </h4>

            <div id="drinkList" class="row g-3">

            </div>

            <hr>

            <!-- KERANJANG -->

            <div class="card border-success">

                <div class="card-header bg-success text-white">

                    🛒 Keranjang Pesanan

                </div>

                <div class="card-body">

                    <table class="table">

                        <thead>

                        <tr>

                            <th>Menu</th>
                            <th>Harga</th>
                            <th>Qty</th>
                            <th>Subtotal</th>
                            <th>Aksi</th>

                        </tr>

                        </thead>

                        <tbody id="cartBody">

                        </tbody>

                    </table>

                    <hr>

                    <div class="d-flex justify-content-between">

                        <h5>Total Harga</h5>

                        <h4 class="text-success">

                            Rp <span id="grandTotal">

                                0

                            </span>

                        </h4>

                    </div>

                </div>

            </div>

            <br>

            <!-- BUTTON -->

            <button
                id="orderBtn"
                class="btn btn-success btn-lg w-100">

                🍽️ Pesan Sekarang

            </button>

        </div>

    </div>

    <br>

    <!-- HASIL TRANSAKSI -->

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            Hasil Transaksi Blockchain

        </div>

        <div class="card-body">

            <pre id="result">

Belum ada transaksi.

            </pre>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

<script src="app.js"></script>

</body>

</html>
