<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Admin Kantin Digital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            🍽️ Admin Kantin Digital
        </h1>

        <p class="text-secondary">
            Sistem Monitoring Pesanan Berbasis Blockchain
        </p>

    </div>

    <!-- ===================== -->
    <!-- DASHBOARD -->
    <!-- ===================== -->

    <div class="row mb-4">

        <div class="col-md-3">
            <div class="card stat-card">
                <h5>Total Pesanan</h5>
                <h2 id="totalOrder">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card warning">
                <h5>Diproses</h5>
                <h2 id="diprosesCount">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card success">
                <h5>Selesai</h5>
                <h2 id="selesaiCount">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card danger">
                <h5>Remote Aktif</h5>
                <h2 id="aktifCount">0</h2>
            </div>
        </div>

    </div>

    <!-- ===================== -->
    <!-- DATA PESANAN -->
    <!-- ===================== -->

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h5 class="mb-0">
                <i class="bi bi-list-check"></i>
                Data Pesanan
            </h5>

            <div class="d-flex gap-2">

                <button id="toggleArchive"
                        class="btn btn-warning btn-sm">

                    📂 Tampilkan Riwayat

                </button>

                <button id="refresh"
                        class="btn btn-light btn-sm">

                    🔄 Refresh

                </button>

            </div>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Pembeli</th>
                        <th>Remote</th>
                        <th>Pembayaran</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th width="280">Proses</th>
                        <th width="120">Aksi</th>

                    </tr>

                    </thead>

                    <tbody id="orderTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- ===================== -->
    <!-- VERIFIKASI BLOCKCHAIN -->
    <!-- ===================== -->

    <div class="card shadow-lg border-0 mt-4">

        <div class="card-header bg-success text-white">

            <h5 class="mb-0">

                🔍 Verifikasi Transaksi Blockchain

            </h5>

        </div>

        <div class="card-body">

            <label class="form-label">

                Transaction Hash

            </label>

            <textarea
                    id="verifyHash"
                    class="form-control"
                    rows="3"
                    placeholder="Paste Transaction Hash di sini..."></textarea>

            <div class="mt-3">

                <button
                        class="btn btn-secondary"
                        onclick="pasteHash()">

                    📋 Paste

                </button>

                <button
                        class="btn btn-success"
                        onclick="verifyHash()">

                    🔍 Verifikasi

                </button>

            </div>

            <hr>

            <div id="verifyResult"></div>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- MODAL DETAIL -->
<!-- ===================== -->

<div class="modal fade"
     id="detailModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header bg-primary text-white">

                <h5 class="modal-title">

                    Detail Pesanan

                </h5>

                <button
                        type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <div id="detailContent">

                </div>

            </div>

            <div class="modal-footer">

                <button
                        id="btnDiproses"
                        class="btn btn-warning">

                    Diproses

                </button>

                <button
                        id="btnSelesai"
                        class="btn btn-success">

                    Selesai

                </button>

                <button
                        id="btnClear"
                        class="btn btn-danger">

                    CLEAR

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin.js"></script>

</body>
</html>
